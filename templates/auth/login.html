{% extends 'base.html' %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: calc(100vh - 250px);
    }

    .auth-card {
        background-color: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2.5rem;
        max-width: 400px;
        width: 100%;
        box-shadow: 0 20px 40px rgba(26,5,162,0.25), 0 0 0 1px rgba(143,1,119,0.15);
    }

    .auth-card h2 {
        margin-top: 0;
        margin-bottom: 2rem;
        text-align: center;
        background: linear-gradient(to right, var(--secondary), var(--accent), var(--highlight));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .form-group input {
        width: 100%;
        padding: 0.75rem;
        background: var(--bg-dark);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: white;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }
    .form-group input:focus {
        outline: none;
        border-color: #8F0177;
        box-shadow: 0 0 0 2px rgba(143,1,119,0.2);
    }

    .auth-footer {
        margin-top: 2rem;
        text-align: center;
        color: var(--text-muted);
        font-size: 0.9rem;
    }

    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back.</h2>
        <form class="auth-form" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" required>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Login</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Register</a>
        </div>
    </div>
</div>
{% endblock %}
