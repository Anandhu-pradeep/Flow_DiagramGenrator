{% extends 'base.html' %}

{% block extra_css %}
<style>
.create-container {
    max-width: 560px;
    margin: 4rem auto;
}
.create-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    box-shadow: 0 20px 40px rgba(26,5,162,0.2);
}
.create-card h2 {
    margin: 0 0 0.5rem;
    background: linear-gradient(to right, var(--secondary), var(--accent));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.create-card p { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }

.form-group { margin-bottom: 1.25rem; }
.form-group label { display: block; margin-bottom: 0.4rem; color: var(--text-muted); font-size: 0.88rem; font-weight: 600; }
.form-group input, .form-group textarea {
    width: 100%;
    padding: 0.8rem 1rem;
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: white;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    box-sizing: border-box;
    transition: border-color 0.2s;
}
.form-group input:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--secondary);
    box-shadow: 0 0 0 2px rgba(143,1,119,0.2);
}
.form-group textarea { resize: vertical; min-height: 90px; }
.form-actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
.btn-cancel {
    background: var(--bg-surface);
    color: var(--text-muted);
    border: 1px solid var(--border);
}
.btn-cancel:hover { border-color: var(--text-muted); color: white; }
</style>
{% endblock %}

{% block content %}
<div class="create-container">
    <div class="create-card">
        <h2>🏢 Create Organization</h2>
        <p>Build a shared workspace for your team to collaborate on flow diagrams.</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Organization Name *</label>
                <input type="text" id="name" name="name" placeholder="e.g. Acme Team" required maxlength="200">
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="What does this organization do?"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="flex:1;">Create Organization</button>
                <a href="{% url 'org_list' %}" class="btn btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
